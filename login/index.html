<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="富邦銀行網上銀行登入 - 安全登入您的個人或企業賬戶">
  <title>網上銀行登入 | 富邦銀行</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <a href="#main-content" class="skip-link">跳至主要內容</a>
  
  <!-- Minimal Header -->
  <header class="global-header" role="banner">
    <nav class="nav-container">
      <a href="/" class="nav-logo">
        <svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="24" font-family="system-ui, -apple-system" font-size="20" font-weight="bold" fill="#1D1D1F">富邦銀行</text>
        </svg>
      </a>
      <a href="/" class="btn btn-secondary btn-sm">返回首頁</a>
    </nav>
  </header>
  
  <main id="main-content">
    <!-- Login Page -->
    <section class="login-page">
      <div class="login-container">
        <div class="login-header">
          <h1>網上銀行登入</h1>
          <p>安全登入您的富邦銀行賬戶</p>
        </div>
        
        <div class="login-tabs">
          <button class="tab active" data-tab="personal">個人銀行</button>
          <button class="tab" data-tab="business">企業銀行</button>
        </div>
        
        <!-- Personal Login Form -->
        <form class="login-form" id="personal-login" novalidate>
          <div class="form-group">
            <label for="personal-username" class="form-label">用戶名稱</label>
            <input 
              type="text" 
              id="personal-username" 
              name="username" 
              class="form-input" 
              placeholder="輸入用戶名稱"
              required
              autocomplete="username"
            >
          </div>
          
          <div class="form-group">
            <label for="personal-password" class="form-label">密碼</label>
            <input 
              type="password" 
              id="personal-password" 
              name="password" 
              class="form-input"
              placeholder="輸入密碼"
              required
              autocomplete="current-password"
            >
          </div>
          
          <div class="form-group">
            <label for="personal-security-code" class="form-label">保安編碼</label>
            <input 
              type="text" 
              id="personal-security-code" 
              name="security-code" 
              class="form-input"
              placeholder="輸入保安編碼"
              required
              inputmode="numeric"
              pattern="[0-9]{6}"
              maxlength="6"
            >
          </div>
          
          <div class="form-options" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-6);">
            <label class="form-checkbox" style="margin: 0;">
              <input type="checkbox" name="remember">
              <span class="checkbox-mark"></span>
              <span class="checkbox-label">記住用戶名稱</span>
            </label>
            <a href="/login/forgot-password/" class="link">忘記密碼？</a>
          </div>
          
          <button type="submit" class="btn btn-primary btn-block">
            登入
          </button>
        </form>
        
        <!-- Business Login Form (hidden by default) -->
        <form class="login-form" id="business-login" novalidate style="display: none;">
          <div class="form-group">
            <label for="business-company-id" class="form-label">公司編號</label>
            <input 
              type="text" 
              id="business-company-id" 
              name="company-id" 
              class="form-input" 
              placeholder="輸入公司編號"
              required
              autocomplete="organization"
            >
          </div>
          
          <div class="form-group">
            <label for="business-user-id" class="form-label">用戶編號</label>
            <input 
              type="text" 
              id="business-user-id" 
              name="user-id" 
              class="form-input"
              placeholder="輸入用戶編號"
              required
              autocomplete="username"
            >
          </div>
          
          <div class="form-group">
            <label for="business-password" class="form-label">密碼</label>
            <input 
              type="password" 
              id="business-password" 
              name="password" 
              class="form-input"
              placeholder="輸入密碼"
              required
              autocomplete="current-password"
            >
          </div>
          
          <div class="form-group">
            <label for="business-security-token" class="form-label">保安編碼器號碼</label>
            <input 
              type="text" 
              id="business-security-token" 
              name="security-token" 
              class="form-input"
              placeholder="輸入保安編碼器顯示的號碼"
              required
              inputmode="numeric"
              pattern="[0-9]{8}"
              maxlength="8"
            >
          </div>
          
          <button type="submit" class="btn btn-primary btn-block">
            登入
          </button>
        </form>
        
        <div class="login-help">
          <p>首次使用網上銀行？</p>
          <a href="/personal/e-banking/register/" class="btn btn-secondary">
            立即登記
          </a>
        </div>
        
        <div class="login-security">
          <div class="security-badge">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="7" width="10" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 7V5C5 3.89543 5.89543 3 7 3H9C10.1046 3 11 3.89543 11 5V7" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="8" cy="10" r="1.5" fill="currentColor"/>
            </svg>
            <span>256 位元 SSL 加密</span>
          </div>
          <a href="/support/security/" class="security-link">
            安全提示
          </a>
        </div>
      </div>
    </section>
    
    <!-- Security Information -->
    <section class="section" style="background: var(--bg-secondary);">
      <div class="container" style="max-width: 800px;">
        <div class="section-header">
          <h2>登入安全提示</h2>
        </div>
        
        <div class="features-grid">
          <article class="feature-card">
            <div class="feature-icon">🔒</div>
            <h3>保護您的密碼</h3>
            <p>切勿向任何人透露您的密碼，包括銀行職員。</p>
          </article>
          
          <article class="feature-card">
            <div class="feature-icon">⚠️</div>
            <h3>提防釣魚網站</h3>
            <p>確認網址為 https://www.fubonbank.com.hk</p>
          </article>
          
          <article class="feature-card">
            <div class="feature-icon">🔔</div>
            <h3>即時通知</h3>
            <p>開啟交易通知，隨時掌握賬戶活動。</p>
          </article>
          
          <article class="feature-card">
            <div class="feature-icon">📞</div>
            <h3>可疑活動</h3>
            <p>如發現可疑活動，請立即致電 2806 5062。</p>
          </article>
        </div>
      </div>
    </section>
  </main>
  
  <!-- Minimal Footer -->
  <footer class="global-footer" role="contentinfo" style="margin-top: 0;">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0; justify-content: center;">
        <div class="footer-legal">
          <a href="/terms/">使用條款</a>
          <a href="/privacy/">隱私權政策</a>
          <a href="/disclaimer/">免責聲明</a>
        </div>
      </div>
      
      <div class="footer-regulatory" style="text-align: center; margin-top: var(--space-6);">
        <p>© 2026 富邦銀行（香港）有限公司 版權所有</p>
      </div>
    </div>
  </footer>
  
  <script src="/js/main.js" defer></script>
</body>
</html>
