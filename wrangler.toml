# Cloudflare Pages 配置檔
# Fubon Bank Redesign Deployment Configuration

name = "fubon-bank-redesign"
compatibility_date = "2024-01-01"

# Pages 靜態網站配置
[build]
command = ""
publish_dir = "."

# 環境變數
[vars]
ENVIRONMENT = "production"
SITE_NAME = "Fubon Bank Redesign"

# 開發環境配置
[env.dev]
name = "fubon-bank-redesign-dev"

[env.dev.vars]
ENVIRONMENT = "development"

# 部署設定
[[redirects]]
from = "/personal"
to = "/pages/personal/"
status = 301

[[redirects]]
from = "/commercial"
to = "/pages/commercial/"
status = 301

[[redirects]]
from = "/wealth"
to = "/pages/wealth/"
status = 301

[[redirects]]
from = "/ebanking"
to = "/pages/ebanking/"
status = 301

[[redirects]]
from = "/about"
to = "/pages/about/"
status = 301

# 安全Headers
[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';"

# 緩存設定
[[headers]]
for = "/css/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/js/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/images/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
