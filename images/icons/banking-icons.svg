<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- 存款 Deposit -->
  <symbol id="deposit" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 6v6l4 2"/>
  </symbol>
  
  <!-- 貸款 Loan -->
  <symbol id="loan" viewBox="0 0 24 24">
    <rect x="3" y="4" width="18" height="16" rx="2"/>
    <path d="M7 8h2M7 12h2M7 16h2M12 8h5M12 12h5M12 16h5"/>
  </symbol>
  
  <!-- 信用卡 Credit Card -->
  <symbol id="card" viewBox="0 0 24 24">
    <rect x="2" y="5" width="20" height="14" rx="2"/>
    <line x1="2" y1="10" x2="22" y2="10"/>
  </symbol>
  
  <!-- 投資 Investment -->
  <symbol id="investment" viewBox="0 0 24 24">
    <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
    <polyline points="16 7 22 7 22 13"/>
  </symbol>
  
  <!-- 保險 Insurance -->
  <symbol id="insurance" viewBox="0 0 24 24">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    <path d="M9 12l2 2 4-4"/>
  </symbol>
  
  <!-- 手機銀行 Mobile Banking -->
  <symbol id="mobile" viewBox="0 0 24 24">
    <rect x="5" y="2" width="14" height="20" rx="2"/>
    <line x1="12" y1="18" x2="12.01" y2="18"/>
  </symbol>
  
  <!-- 家庭 Family -->
  <symbol id="family" viewBox="0 0 24 24">
    <circle cx="12" cy="8" r="4"/>
    <path d="M6 20v-2a6 6 0 0 1 12 0v2"/>
  </symbol>
  
  <!-- 財富 Wealth -->
  <symbol id="wealth" viewBox="0 0 24 24">
    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
    <path d="M2 17l10 5 10-5"/>
    <path d="M2 12l10 5 10-5"/>
  </symbol>
  
  <!-- 保安 Security -->
  <symbol id="security" viewBox="0 0 24 24">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
  </symbol>
  
  <!-- 聯絡我們 Contact -->
  <symbol id="contact" viewBox="0 0 24 24">
    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
    <circle cx="12" cy="10" r="3"/>
  </symbol>
  
  <!-- 分支行 Branch -->
  <symbol id="branch" viewBox="0 0 24 24">
    <path d="M3 21h18M5 21V7l8-4 8 4v14M9 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
  </symbol>
